<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pulse — Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{ --bg:#f1f5f9; --panel:#ffffff; --accent:#4f46e5; --text:#0f172a; --muted:#64748b; --border:#e2e8f0; --bubble-me:#4f46e5; --bubble-them:#f1f5f9;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;margin:0;height:100vh;display:flex;padding:12px;gap:12px;box-sizing:border-box;}
aside{width:300px;background:var(--panel);border-radius:20px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
main{flex:1;background:var(--panel);border-radius:20px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.header{padding:18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.conv-item{padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:0.2s;}
.conv-item.active{background:#eef2ff;border-left:4px solid var(--accent);}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:70%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;position:relative;}
.msg.me{align-self:flex-end;background:var(--bubble-me);color:#fff;border-bottom-right-radius:4px;}
.msg.them{align-self:flex-start;background:var(--bubble-them);color:var(--text);border-bottom-left-radius:4px;}
.msg img{max-width:100%;border-radius:10px;margin-top:5px;}
.seen{font-size:10px;text-align:right;margin-top:2px;font-weight:700;opacity:0.8;}
.typing{height:18px;padding:0 20px;font-size:11px;color:var(--accent);font-weight:600;}
.composer{padding:12px;display:flex;gap:10px;border-top:1px solid var(--border);}
.composer input{flex:1;background:#f8fafc;border:1px solid var(--border);padding:12px 18px;border-radius:12px;outline:none;}
.hidden{display:none;}
</style>
</head>
<body>
<aside>
    <div class="header"><b>Pulse</b><button id="lo" style="border:none;background:none;cursor:pointer;color:var(--muted)">Logout</button></div>
    <div id="list" style="flex:1;overflow-y:auto"></div>
</aside>
<main>
    <div id="no" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted)">Select a chat</div>
    <div id="ui" class="hidden" style="flex:1;display:flex;flex-direction:column">
        <div id="msgs" class="messages"></div>
        <div id="ty" class="typing"></div>
        <form id="cf" class="composer">
            <label style="cursor:pointer;padding:10px">📷<input type="file" id="fi" class="hidden"></label>
            <input id="mi" placeholder="Message..." autocomplete="off">
            <button type="submit" style="background:var(--accent);color:white;border:none;padding:10px 20px;border-radius:10px">Send</button>
        </form>
    </div>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://watrcanjjxdycydmllrj.supabase.co', 'sb_publishable_dXrYdphNQJdWL_U4IjALTQ__rMZWfgQ');
const state = { user: null, activeId: null, channel: null, lastSeen: {} };
const $ = s => document.querySelector(s);

async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if(!session) return window.location.href = 'login.html';
    const { data: p } = await sb.from('users').select('*').eq('id', session.user.id).single();
    state.user = p;
    loadConvs();
}

async function loadConvs() {
    const { data } = await sb.from('conversation_members').select('conversations(*)').eq('user_id', state.user.id);
    $('#list').innerHTML = data.map(m => `
        <div class="conv-item ${state.activeId === m.conversations.id ? 'active' : ''}" onclick="window.chat('${m.conversations.id}')">
            ${m.conversations.name || 'Personal Chat'}
        </div>
    `).join('');
}

window.chat = async (id) => {
    state.activeId = id;
    $('#no').classList.add('hidden'); $('#ui').classList.remove('hidden');
    loadConvs();
    await fetchReceipts();
    renderAll();
    setupBroadcast(id);
};

async function fetchReceipts() {
    const { data } = await sb.from('conversation_members').select('user_id, last_read_message_id').eq('conversation_id', state.activeId);
    data.forEach(m => { if(m.user_id !== state.user.id) state.lastSeen[m.user_id] = m.last_read_message_id; });
}

async function renderAll() {
    const { data } = await sb.from('messages').select('*, users(username)').eq('conversation_id', state.activeId).order('created_at',{ascending:true});
    $('#msgs').innerHTML = data.map(m => {
        const isMe = m.sender_id === state.user.id;
        const body = m.content.startsWith('IMAGE:') ? `<img src="${m.content.replace('IMAGE:','')}">` : `<span>${m.content}</span>`;
        const seen = (isMe && Object.values(state.lastSeen).includes(m.id)) ? '<div class="seen">Seen</div>' : '';
        return `<div class="msg ${isMe ? 'me' : 'them'}"><small style="font-size:10px;opacity:0.7;display:block">${m.users?.username || 'User'}</small>${body}${seen}</div>`;
    }).join('');
    $('#msgs').scrollTop = $('#msgs').scrollHeight;
    
    const last = [...data].reverse().find(x => x.sender_id !== state.user.id);
    if(last) {
        await sb.from('conversation_members').update({ last_read_message_id: last.id }).match({ conversation_id: state.activeId, user_id: state.user.id });
        state.channel?.send({ type:'broadcast', event:'read', payload:{ uid: state.user.id, mid: last.id }});
    }
}

function setupBroadcast(id) {
    if(state.channel) sb.removeChannel(state.channel);
    state.channel = sb.channel(`chat:${id}`)
        .on('broadcast', { event: 'msg' }, ({ payload }) => { if(payload.sender_id !== state.user.id) renderAll(); })
        .on('broadcast', { event: 'typing' }, ({ payload }) => { $('#ty').textContent = payload.is ? `${payload.u} is typing...` : ''; })
        .on('broadcast', { event: 'read' }, ({ payload }) => { state.lastSeen[payload.uid] = payload.mid; renderAll(); })
        .subscribe();
}

$('#mi').oninput = () => {
    state.channel?.send({ type:'broadcast', event:'typing', payload:{ u: state.user.username, is: true }});
    clearTimeout(window.tT);
    window.tT = setTimeout(() => state.channel?.send({ type:'broadcast', event:'typing', payload:{ is: false }}), 2000);
};

$('#cf').onsubmit = async (e) => {
    e.preventDefault();
    const val = $('#mi').value; if(!val.trim()) return;
    $('#mi').value = '';
    const { data } = await sb.from('messages').insert({ conversation_id: state.activeId, sender_id: state.user.id, content: val }).select();
    state.channel?.send({ type: 'broadcast', event: 'msg', payload: data[0] });
    renderAll();
};

$('#fi').onchange = async (e) => {
    const file = e.target.files[0];
    const path = `${state.activeId}/${Date.now()}`;
    await sb.storage.from('chat-images').upload(path, file);
    const { data: { publicUrl } } = sb.storage.from('chat-images').getPublicUrl(path);
    const { data } = await sb.from('messages').insert({ conversation_id: state.activeId, sender_id: state.user.id, content: `IMAGE:${publicUrl}` }).select();
    state.channel?.send({ type: 'broadcast', event: 'msg', payload: data[0] });
    renderAll();
};

$('#lo').onclick = async () => { await sb.auth.signOut(); window.location.href = 'login.html'; };
init();
</script>
</body>
</html>
