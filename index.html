<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pulse — Realtime Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef2f7;
  --bg-grad:radial-gradient(1200px 600px at -10% -10%, #c7d2fe55, transparent 60%),
            radial-gradient(900px 600px at 110% 110%, #a7f3d055, transparent 60%);
  --panel:#ffffff;
  --panel-2:#f7f9fc;
  --bubble-me:linear-gradient(135deg,#6366f1,#8b5cf6);
  --bubble-me-text:#fff;
  --bubble-them:#f1f4f9;
  --bubble-them-text:#0f172a;
  --text:#0b1220;
  --muted:#6b7488;
  --accent:#6366f1;
  --accent-2:#10b981;
  --danger:#ef4444;
  --border:rgba(15,23,42,.08);
  --hover:rgba(15,23,42,.04);
  --ring:0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
  --shadow-sm:0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 8px 24px rgba(15,23,42,.08);
  --shadow-lg:0 20px 60px rgba(15,23,42,.18);
  --radius:16px;
}
.dark{
  --bg:#070a14;
  --bg-grad:radial-gradient(1200px 600px at -10% -10%, #6366f140, transparent 60%),
            radial-gradient(900px 600px at 110% 110%, #10b98130, transparent 60%);
  --panel:#0f1426;
  --panel-2:#0a0f1f;
  --bubble-me:linear-gradient(135deg,#6366f1,#8b5cf6);
  --bubble-them:#181f33;
  --bubble-them-text:#e6ecf7;
  --text:#e6ecf7;
  --muted:#8a93a8;
  --border:rgba(255,255,255,.07);
  --hover:rgba(255,255,255,.045);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow-md:0 8px 24px rgba(0,0,0,.45);
  --shadow-lg:0 20px 60px rgba(0,0,0,.6);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
body::before{content:"";position:fixed;inset:0;background:var(--bg-grad);pointer-events:none;z-index:0}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font:inherit;color:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 30%,transparent);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--muted) 50%,transparent)}

#app{position:relative;z-index:1;height:100%;display:flex;padding:18px;gap:18px}
@media(max-width:760px){#app{padding:0;gap:0}}

/* ===== AUTH ===== */
#auth{margin:auto;background:var(--panel);padding:36px;border-radius:24px;width:400px;max-width:92vw;box-shadow:var(--shadow-lg);border:1px solid var(--border);position:relative;overflow:hidden}
#auth::before{content:"";position:absolute;inset:-1px;border-radius:24px;padding:1px;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.35;pointer-events:none}
#auth .logo{width:54px;height:54px;border-radius:16px;margin:0 auto 14px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px;box-shadow:0 10px 30px color-mix(in srgb,var(--accent) 35%,transparent)}
#auth h1{margin:0 0 4px;font-size:26px;text-align:center;font-weight:800;letter-spacing:-.02em}
#auth .sub{text-align:center;color:var(--muted);font-size:13.5px;margin-bottom:22px}
#auth label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:10px 0 4px;letter-spacing:.02em;text-transform:uppercase}
#auth input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--panel-2);outline:none;transition:.15s}
#auth input:focus{border-color:var(--accent);box-shadow:var(--ring)}
#auth button.submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-radius:12px;margin-top:18px;font-weight:600;transition:.15s;box-shadow:0 8px 24px color-mix(in srgb,var(--accent) 30%,transparent)}
#auth button.submit:hover{transform:translateY(-1px);box-shadow:0 14px 32px color-mix(in srgb,var(--accent) 40%,transparent)}
#auth .toggle{text-align:center;margin-top:14px;color:var(--muted);font-size:13px}
#auth .toggle a{color:var(--accent);cursor:pointer;font-weight:600}
#auth .err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;min-height:18px}

/* ===== CHAT LAYOUT ===== */
#chat{display:none;width:100%;height:100%;gap:18px}
.sidebar{width:340px;background:var(--panel);border:1px solid var(--border);border-radius:24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-md)}
.main{flex:1;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:var(--shadow-md);position:relative}
@media(max-width:760px){#chat{gap:0}.sidebar,.main{border-radius:0;border:none}}

/* ===== SIDEBAR ===== */
.s-head{padding:18px 18px 14px;display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.brand .mark{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 35%,transparent)}
.brand .name{font-weight:800;font-size:18px;letter-spacing:-.02em}
.brand .name small{display:block;font-weight:500;font-size:11.5px;color:var(--muted);letter-spacing:0;margin-top:1px}
.icon-btn{width:36px;height:36px;border-radius:10px;color:var(--muted);transition:.15s;display:flex;align-items:center;justify-content:center;font-size:15px}
.icon-btn:hover{background:var(--hover);color:var(--text)}
.search{padding:6px 14px 12px}
.search-box{position:relative}
.search-box input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border);border-radius:12px;background:var(--panel-2);outline:none;font-size:13.5px;transition:.15s}
.search-box input:focus{border-color:var(--accent);box-shadow:var(--ring)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.s-actions{display:flex;gap:8px;padding:0 14px 12px}
.s-actions button{flex:1;padding:9px 10px;border-radius:11px;font-size:13px;font-weight:600;background:var(--panel-2);border:1px solid var(--border);transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text)}
.s-actions button:hover{border-color:var(--accent);color:var(--accent)}
.s-section{padding:6px 22px 4px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.conv-list{flex:1;overflow-y:auto;padding:4px 8px 12px}
.conv{display:flex;gap:12px;padding:10px;cursor:pointer;border-radius:14px;align-items:center;transition:.12s;position:relative}
.conv:hover{background:var(--hover)}
.conv.active{background:color-mix(in srgb,var(--accent) 12%,transparent)}
.conv.active::before{content:"";position:absolute;left:2px;top:14px;bottom:14px;width:3px;border-radius:3px;background:linear-gradient(var(--accent),var(--accent-2))}
.avatar{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;letter-spacing:.02em;position:relative}
.avatar.gradient-0{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.avatar.gradient-1{background:linear-gradient(135deg,#10b981,#059669)}
.avatar.gradient-2{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.avatar.gradient-3{background:linear-gradient(135deg,#06b6d4,#3b82f6)}
.avatar.gradient-4{background:linear-gradient(135deg,#ec4899,#f43f5e)}
.avatar.gradient-5{background:linear-gradient(135deg,#8b5cf6,#ec4899)}
.avatar.lg{width:46px;height:46px;border-radius:15px;font-size:15px}
.avatar.sm{width:32px;height:32px;border-radius:11px;font-size:12px}
.avatar .pres{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;background:#94a3b8;border:2.5px solid var(--panel)}
.avatar .pres.on{background:#10b981}
.conv-body{flex:1;min-width:0}
.conv-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.conv-name{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.conv-time{font-size:11px;color:var(--muted);flex-shrink:0;font-weight:500}
.conv-bot{display:flex;justify-content:space-between;align-items:center;margin-top:3px;gap:8px}
.conv-prev{color:var(--muted);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.badge{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 8px;min-width:22px;text-align:center;box-shadow:0 4px 10px color-mix(in srgb,var(--accent) 40%,transparent)}
.empty-list{padding:32px 20px;text-align:center;color:var(--muted);font-size:13px}

/* ===== MAIN ===== */
.empty{margin:auto;color:var(--muted);text-align:center;padding:40px;max-width:340px}
.empty .ico{width:80px;height:80px;margin:0 auto 18px;border-radius:24px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;box-shadow:0 16px 40px color-mix(in srgb,var(--accent) 30%,transparent)}
.empty h3{margin:0 0 6px;color:var(--text);font-weight:700;font-size:18px;letter-spacing:-.02em}
.empty p{margin:0;font-size:14px;line-height:1.5}
.m-head{padding:14px 22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--panel-2) 60%,transparent);backdrop-filter:blur(10px)}
.m-head .info{flex:1;min-width:0}
.m-head .name{font-weight:700;font-size:15.5px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.m-head .sub{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block}
.dot.on{background:#10b981;box-shadow:0 0 0 3px color-mix(in srgb,#10b981 25%,transparent)}
.messages{flex:1;overflow-y:auto;padding:24px 6% 16px;display:flex;flex-direction:column;gap:2px;background:var(--panel)}
.day-sep{align-self:center;padding:4px 12px;font-size:11px;color:var(--muted);background:var(--panel-2);border:1px solid var(--border);border-radius:999px;margin:14px 0 6px;font-weight:600}
.msg{max-width:68%;padding:9px 14px 10px;border-radius:18px;animation:pop .22s cubic-bezier(.2,.9,.3,1.2);word-wrap:break-word;position:relative;font-size:14.5px;line-height:1.45;display:inline-flex;flex-direction:column}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:none}}
.msg.me{align-self:flex-end;background:var(--bubble-me);color:var(--bubble-me-text);border-bottom-right-radius:6px;box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 25%,transparent)}
.msg.them{align-self:flex-start;background:var(--bubble-them);color:var(--bubble-them-text);border-bottom-left-radius:6px;box-shadow:var(--shadow-sm)}
.msg + .msg.me, .msg + .msg.them{margin-top:1px}
.msg .sender{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:2px;letter-spacing:-.01em}
.msg .time{font-size:10.5px;opacity:.75;margin-top:3px;align-self:flex-end;font-weight:500}
.msg.me .time{color:rgba(255,255,255,.85)}
.msg.them .time{color:var(--muted)}
.composer{padding:14px 20px 18px;display:flex;gap:10px;align-items:center;border-top:1px solid var(--border);background:var(--panel)}
.composer input{flex:1;padding:13px 18px;border-radius:999px;border:1px solid var(--border);background:var(--panel-2);outline:none;transition:.15s;font-size:14.5px}
.composer input:focus{border-color:var(--accent);box-shadow:var(--ring);background:var(--panel)}
.composer button.send{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;width:46px;height:46px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s;box-shadow:0 8px 22px color-mix(in srgb,var(--accent) 35%,transparent);flex-shrink:0}
.composer button.send:hover{transform:scale(1.06)}
.composer button.send:active{transform:scale(.96)}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(2,6,23,.55);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:50;animation:fade .2s;padding:16px}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel);padding:26px;border-radius:22px;width:440px;max-width:100%;max-height:84vh;overflow-y:auto;border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:pop .25s cubic-bezier(.2,.9,.3,1.2)}
.modal h2{margin:0 0 6px;font-size:20px;font-weight:700;letter-spacing:-.02em}
.modal .desc{color:var(--muted);font-size:13.5px;margin-bottom:18px}
.modal input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:14px;background:var(--panel-2);outline:none;transition:.15s}
.modal input:focus{border-color:var(--accent);box-shadow:var(--ring)}
.modal .user-row{display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;cursor:pointer;transition:.12s;border:1px solid transparent}
.modal .user-row:hover{background:var(--hover)}
.modal .user-row.sel{background:color-mix(in srgb,var(--accent) 10%,transparent);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
.modal .user-row.sel::after{content:'✓';margin-left:auto;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.modal .user-row .uname{font-weight:600;font-size:14px}
.modal .actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.modal .actions button{padding:10px 18px;border-radius:11px;font-weight:600;font-size:14px;transition:.15s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 30%,transparent)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-ghost{color:var(--muted)}
.btn-ghost:hover{background:var(--hover);color:var(--text)}

/* ===== TOAST ===== */
#toasts{position:fixed;top:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:10px;max-width:340px}
.toast{background:var(--panel);padding:12px 14px;border-radius:14px;box-shadow:var(--shadow-lg);animation:slide .3s cubic-bezier(.2,.9,.3,1.2);border:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
@keyframes slide{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
.toast .av{flex-shrink:0}
.toast b{display:block;font-size:13.5px;font-weight:700;letter-spacing:-.01em;margin-bottom:1px}
.toast span{font-size:13px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

@media (max-width:760px){
  .sidebar{width:100%}
  .main{display:none}
  body.show-chat .sidebar{display:none}
  body.show-chat .main{display:flex}
}
</style>
</head>
<body>
<div id="app">
  <!-- AUTH -->
  <div id="auth">
    <div class="logo">P</div>
    <h1>Welcome to Pulse</h1>
    <div class="sub">Real-time messaging, beautifully simple</div>
    <label>Email</label>
    <input id="au-email" type="email" placeholder="you@example.com" />
    <label>Password</label>
    <input id="au-pass" type="password" placeholder="••••••••" />
    <div id="au-name-wrap">
      <label>Username</label>
      <input id="au-name" type="text" placeholder="Pick a username" />
    </div>
    <button id="au-submit" class="submit">Log in</button>
    <div class="err" id="au-err"></div>
    <div class="toggle">
      <span id="au-mode-text">Don't have an account?</span>
      <a id="au-toggle">Sign up</a>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <aside class="sidebar">
      <div class="s-head">
        <div class="brand">
          <div class="mark">P</div>
          <div class="name">Pulse<small id="me-name">…</small></div>
        </div>
        <button class="icon-btn" id="btn-theme" title="Theme">🌓</button>
        <button class="icon-btn" id="btn-logout" title="Logout">⏻</button>
      </div>
      <div class="search">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search-input" placeholder="Search conversations" />
        </div>
      </div>
      <div class="s-actions">
        <button id="btn-new-dm">+ New chat</button>
        <button id="btn-new-group">+ New group</button>
      </div>
      <div class="s-section">Conversations</div>
      <div class="conv-list" id="conv-list"></div>
    </aside>
    <section class="main" id="main">
      <div class="empty" id="empty">
        <div class="ico">💬</div>
        <h3>Your messages</h3>
        <p>Pick a chat from the left or start a new conversation to say hi.</p>
      </div>
    </section>
  </div>
</div>
<div id="toasts"></div>
<div id="modal-root"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ====== CONFIG — replace these ====== */
const SUPABASE_URL = 'https://vzaysxoccycyiocetare.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DBAxzbbFybRgQDnQl5eZZg_ggRUzC4O';
/* ==================================== */

const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  realtime: { params: { eventsPerSecond: 20 } }
});

const state = {
  user: null,
  conversations: [],
  activeId: null,
  messagesById: {},
  convChannels: {},     // convId -> Realtime channel (broadcast)
  presenceChannel: null,
  online: new Set(),
  authMode: 'login',
  searchQuery: '',
};

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const el = (tag, props={}, ...kids) => {
  const n = document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(v===false||v===null||v===undefined) return;
    if(k==='class') n.className=v;
    else if(k==='onclick') n.onclick=v;
    else if(k==='oninput') n.oninput=v;
    else if(k==='onsubmit') n.onsubmit=v;
    else if(k==='html') n.innerHTML=v;
    else n.setAttribute(k,v);
  });
  kids.flat().forEach(k=>{
    if(k===false||k===null||k===undefined||k==='') return;
    n.append(k?.nodeType?k:document.createTextNode(String(k)));
  });
  return n;
};
const initials = s => (s||'?').trim().slice(0,2).toUpperCase();
const gradientFor = id => 'gradient-'+(Math.abs([...String(id||'')].reduce((a,c)=>a+c.charCodeAt(0),0))%6);
const fmtTime = ts => {
  const d=new Date(ts), n=new Date();
  if(d.toDateString()===n.toDateString()) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const diff=(n-d)/86400000;
  if(diff<7) return d.toLocaleDateString([], {weekday:'short'});
  return d.toLocaleDateString();
};
const fmtDay = ts => {
  const d=new Date(ts), n=new Date();
  if(d.toDateString()===n.toDateString()) return 'Today';
  const y=new Date(n); y.setDate(n.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], {weekday:'long', month:'short', day:'numeric'});
};
const avatar = (name, id, size='') => {
  const node = el('div',{class:`avatar ${size} ${gradientFor(id||name)}`}, initials(name));
  return node;
};
const toast = (title, body, id='') => {
  const t = el('div',{class:'toast'},
    el('div',{class:'av'}, avatar(title, id, 'sm')),
    el('div',{}, el('b',{},title), el('span',{},body))
  );
  $('#toasts').append(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(20px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),300); }, 4000);
};

/* ---------- AUTH ---------- */
function setAuthMode(){
  const login = state.authMode==='login';
  $('#au-submit').textContent = login?'Log in':'Create account';
  $('#au-mode-text').textContent = login?"Don't have an account?":'Already have an account?';
  $('#au-toggle').textContent = login?'Sign up':'Log in';
  $('#au-name-wrap').style.display = login?'none':'block';
}
$('#au-toggle').onclick = () => { state.authMode = state.authMode==='login'?'signup':'login'; setAuthMode(); };
setAuthMode();

$('#au-submit').onclick = async () => {
  const email = $('#au-email').value.trim();
  const password = $('#au-pass').value;
  const username = $('#au-name').value.trim();
  $('#au-err').textContent='';
  try{
    if(state.authMode==='signup'){
      if(!username) throw new Error('Username required');
      const { data, error } = await sb.auth.signUp({ email, password });
      if(error) throw error;
      if(data.user){
        const { error: pe } = await sb.from('users').insert({ id: data.user.id, username });
        if(pe) throw pe;
      }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) throw error;
    }
  } catch(e){ $('#au-err').textContent = e.message; }
};

sb.auth.onAuthStateChange(async (_e, session) => {
  if(session?.user) await onLogin(session.user);
  else showAuth();
});

function showAuth(){ $('#auth').style.display='block'; $('#chat').style.display='none'; }

async function onLogin(authUser){
  let { data: profile } = await sb.from('users').select('*').eq('id', authUser.id).maybeSingle();
  if(!profile){
    await sb.from('users').insert({ id: authUser.id, username: authUser.email.split('@')[0] });
    ({ data: profile } = await sb.from('users').select('*').eq('id', authUser.id).single());
  }
  state.user = profile;
  $('#auth').style.display='none';
  $('#chat').style.display='flex';
  $('#me-name').textContent = '@'+profile.username;
  await sb.from('users').update({ last_seen: new Date().toISOString() }).eq('id', profile.id);
  await loadConversations();
  setupPresence();
  if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
}

$('#btn-logout').onclick = async () => { cleanupSubs(); await sb.auth.signOut(); };
$('#btn-theme').onclick = () => document.documentElement.classList.toggle('dark');

/* ---------- CONVERSATIONS ---------- */
async function loadConversations(){
  const { data: mems } = await sb.from('conversation_members')
    .select('conversation_id, conversations(*)')
    .eq('user_id', state.user.id);
  const convs = (mems||[]).map(m=>m.conversations).filter(Boolean);

  for(const c of convs){
    const { data: ms } = await sb.from('conversation_members')
      .select('user_id, role, users(id,username,avatar_url)').eq('conversation_id', c.id);
    c.members = ms||[];
    const { data: last } = await sb.from('messages')
      .select('*').eq('conversation_id', c.id).order('created_at',{ascending:false}).limit(1);
    c.last = last?.[0];
    c.unread = c.unread || 0;
  }
  state.conversations = convs.sort((a,b)=>(b.last?.created_at||b.created_at).localeCompare(a.last?.created_at||a.created_at));

  // Subscribe to ALL my conversations via Broadcast (no replication needed)
  for(const c of state.conversations) subscribeConv(c.id);
  renderChatList();
}

function convDisplay(c){
  if(c.type==='group') return { name: c.name||'Group', sub: `${c.members.length} members`, avatarName: c.name||'G', avatarId: c.id };
  const other = c.members.find(m=>m.user_id!==state.user.id);
  const u = other?.users;
  return { name: u?.username||'Direct', sub: state.online.has(u?.id)?'Online':'Offline', avatarName: u?.username, avatarId: u?.id, otherId: u?.id };
}

function renderChatList(){
  const list = $('#conv-list'); list.innerHTML='';
  const q = state.searchQuery.toLowerCase();
  const filtered = state.conversations.filter(c=>{
    if(!q) return true;
    const d = convDisplay(c);
    return d.name.toLowerCase().includes(q) || (c.last?.content||'').toLowerCase().includes(q);
  });
  if(!filtered.length){
    list.append(el('div',{class:'empty-list'}, q?'No matches':'No conversations yet — start one above!'));
    return;
  }
  for(const c of filtered){
    const d = convDisplay(c);
    const av = avatar(d.avatarName, d.avatarId);
    if(c.type==='direct'){
      const pres = el('div',{class:'pres'+(state.online.has(d.otherId)?' on':'')});
      av.append(pres);
    }
    const node = el('div',{class:'conv'+(c.id===state.activeId?' active':''), onclick:()=>switchConversation(c.id)},
      av,
      el('div',{class:'conv-body'},
        el('div',{class:'conv-top'},
          el('div',{class:'conv-name'}, (c.type==='group'?'# ':'')+d.name),
          el('div',{class:'conv-time'}, c.last?fmtTime(c.last.created_at):'')
        ),
        el('div',{class:'conv-bot'},
          el('div',{class:'conv-prev'}, c.last? (c.last.sender_id===state.user.id?'You: ':'') + c.last.content : 'No messages yet'),
          c.unread? el('div',{class:'badge'}, String(c.unread)) : null
        )
      )
    );
    list.append(node);
  }
}

$('#search-input').oninput = (e)=>{ state.searchQuery = e.target.value; renderChatList(); };

/* ---------- ACTIVE CONVERSATION ---------- */
async function switchConversation(id){
  state.activeId = id;
  document.body.classList.add('show-chat');
  const c = state.conversations.find(x=>x.id===id);
  if(!c) return;
  c.unread = 0;
  const d = convDisplay(c);

  const main = $('#main'); main.innerHTML='';
  const head = el('div',{class:'m-head'},
    el('button',{class:'icon-btn', onclick:()=>{ document.body.classList.remove('show-chat'); state.activeId=null; renderChatList(); }},'←'),
    avatar(d.avatarName, d.avatarId),
    el('div',{class:'info'},
      el('div',{class:'name'}, (c.type==='group'?'# ':'') + d.name),
      el('div',{class:'sub'},
        c.type==='direct' ? el('span',{class:'dot'+(state.online.has(d.otherId)?' on':'')}) : '',
        c.type==='direct' ? (state.online.has(d.otherId)?'Online':'Offline') : `${c.members.length} members`
      )
    ),
    c.type==='group' ? el('button',{class:'icon-btn', title:'Add member', onclick:()=>openAddMember(c)},'+') : null,
    c.type==='group' ? el('button',{class:'icon-btn', title:'Leave group', onclick:()=>leaveGroup(c)},'⏏') : null
  );
  const msgs = el('div',{class:'messages', id:'msgs'});
  const composer = el('form',{class:'composer', id:'composer'},
    el('input',{id:'msg-input', placeholder:'Write a message…', autocomplete:'off'}),
    el('button',{type:'submit', class:'send'},'➤')
  );
  main.append(head, msgs, composer);
  composer.onsubmit = e => { e.preventDefault(); sendMessage(); };

  await loadMessages(id);
  renderChatList();
  setTimeout(()=>$('#msg-input')?.focus(), 50);
}

async function loadMessages(id){
  const { data } = await sb.from('messages')
    .select('*, users(username)').eq('conversation_id', id)
    .order('created_at',{ascending:true}).limit(200);
  state.messagesById[id] = data||[];
  renderMessages(id);
}

function renderMessages(id){
  if(state.activeId!==id) return;
  const c = state.conversations.find(x=>x.id===id);
  const box = $('#msgs'); if(!box) return; box.innerHTML='';
  const msgs = state.messagesById[id]||[];
  let prevSender = null, prevDay = null;
  for(const m of msgs){
    const day = new Date(m.created_at).toDateString();
    if(day !== prevDay){
      box.append(el('div',{class:'day-sep'}, fmtDay(m.created_at)));
      prevDay = day; prevSender = null;
    }
    const me = m.sender_id===state.user.id;
    const showName = c.type==='group' && !me && m.sender_id!==prevSender;
    const node = el('div',{class:'msg '+(me?'me':'them')},
      showName? el('div',{class:'sender'}, m.users?.username||'?') : null,
      el('span',{}, m.content),
      el('span',{class:'time'}, new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}))
    );
    box.append(node);
    prevSender = m.sender_id;
  }
  box.scrollTop = box.scrollHeight;
}

async function sendMessage(){
  const inp = $('#msg-input'); const content = inp.value.trim();
  if(!content || !state.activeId) return;
  inp.value='';
  const convId = state.activeId;
  const { data, error } = await sb.from('messages').insert({
    conversation_id: convId, sender_id: state.user.id, content
  }).select('*').single();
  if(error){ toast('Failed', error.message, state.user.id); return; }
  // Broadcast to everyone in this conversation channel
  const ch = state.convChannels[convId];
  if(ch){
    ch.send({
      type:'broadcast', event:'message',
      payload:{ ...data, _username: state.user.username }
    });
  }
  // Optimistic local insert (channel won't echo to sender)
  handleIncomingMessage({ ...data, _username: state.user.username }, /*self*/true);
}

/* ---------- REALTIME (Broadcast — no DB replication) ---------- */
function cleanupSubs(){
  Object.values(state.convChannels).forEach(ch => sb.removeChannel(ch));
  state.convChannels = {};
  if(state.presenceChannel) sb.removeChannel(state.presenceChannel);
  state.presenceChannel = null;
}

function subscribeConv(convId){
  if(state.convChannels[convId]) return;
  const ch = sb.channel(`conv:${convId}`, { config:{ broadcast:{ self:false } } })
    .on('broadcast', { event:'message' }, ({ payload }) => handleIncomingMessage(payload, false))
    .subscribe();
  state.convChannels[convId] = ch;
}

function handleIncomingMessage(m, self){
  const c = state.conversations.find(x=>x.id===m.conversation_id);
  if(!c){ loadConversations(); return; }
  const arr = state.messagesById[m.conversation_id] ||= [];
  if(arr.some(x=>x.id===m.id)) return;
  if(m._username) m.users = { username: m._username };
  arr.push(m);
  c.last = m;
  if(!self && state.activeId !== c.id){
    c.unread = (c.unread||0) + 1;
    const d = convDisplay(c);
    const senderName = m._username || 'Someone';
    if(document.hidden && 'Notification' in window && Notification.permission==='granted'){
      new Notification(d.name, { body: `${senderName}: ${m.content}` });
    } else {
      toast(d.name, `${senderName}: ${m.content}`, m.sender_id);
    }
  }
  // re-sort and re-render
  state.conversations.sort((a,b)=>(b.last?.created_at||b.created_at).localeCompare(a.last?.created_at||a.created_at));
  renderChatList();
  if(state.activeId === m.conversation_id) renderMessages(m.conversation_id);
}

function setupPresence(){
  state.presenceChannel = sb.channel('presence', { config:{ presence:{ key: state.user.id } } });
  state.presenceChannel
    .on('presence', { event:'sync' }, () => {
      const st = state.presenceChannel.presenceState();
      state.online = new Set(Object.keys(st));
      renderChatList();
      // refresh header sub for active direct chat
      const c = state.conversations.find(x=>x.id===state.activeId);
      if(c && c.type==='direct'){
        const subEl = document.querySelector('.m-head .sub');
        if(subEl){
          const d = convDisplay(c);
          subEl.innerHTML = '';
          subEl.append(el('span',{class:'dot'+(state.online.has(d.otherId)?' on':'')}), state.online.has(d.otherId)?'Online':'Offline');
        }
      }
    })
    .subscribe(async status => {
      if(status==='SUBSCRIBED') await state.presenceChannel.track({ at: Date.now() });
    });
}

/* ---------- MODALS ---------- */
function modal(node){
  const root = $('#modal-root');
  const bg = el('div',{class:'modal-bg', onclick:e=>{ if(e.target===bg) root.innerHTML=''; }}, node);
  root.innerHTML=''; root.append(bg);
  return ()=>{ root.innerHTML=''; };
}

function userPickerModal({ multi, title, desc, onConfirm }){
  sb.from('users').select('id,username').neq('id', state.user.id).order('username').then(({data: users})=>{
    const sel = new Set();
    const list = el('div',{});
    let close;
    (users||[]).forEach(u=>{
      const row = el('div',{class:'user-row', onclick:()=>{
        if(multi){ sel.has(u.id)?sel.delete(u.id):sel.add(u.id); row.classList.toggle('sel'); }
        else { close(); onConfirm([u.id]); }
      }}, avatar(u.username, u.id, 'sm'), el('div',{class:'uname'}, u.username));
      list.append(row);
    });
    if(!users?.length) list.append(el('div',{class:'empty-list'},'No other users yet — invite a friend!'));
    const nameInput = multi? el('input',{id:'g-name', placeholder:'Group name'}):'';
    const m = el('div',{class:'modal'},
      el('h2',{},title),
      el('div',{class:'desc'}, desc||''),
      nameInput,
      list,
      el('div',{class:'actions'},
        el('button',{class:'btn-ghost', onclick:()=>close()},'Cancel'),
        multi? el('button',{class:'btn-primary', onclick:()=>{
          const name = $('#g-name').value.trim();
          if(!name) return alert('Group name required');
          if(sel.size<1) return alert('Pick at least 1 member');
          close(); onConfirm([...sel], name);
        }},'Create group'):''
      )
    );
    close = modal(m);
  });
}

$('#btn-new-dm').onclick = () => {
  userPickerModal({ multi:false, title:'Start a chat', desc:'Pick a user to start a direct conversation.', onConfirm: async ([otherId]) => {
    const existing = state.conversations.find(c=>c.type==='direct' && c.members.some(m=>m.user_id===otherId));
    if(existing) return switchConversation(existing.id);
    const { data: c, error } = await sb.from('conversations').insert({ type:'direct', created_by: state.user.id }).select().single();
    if(error) return toast('Error', error.message, state.user.id);
    await sb.from('conversation_members').insert([
      { conversation_id: c.id, user_id: state.user.id, role:'member' },
      { conversation_id: c.id, user_id: otherId, role:'member' },
    ]);
    await loadConversations(); switchConversation(c.id);
  }});
};

$('#btn-new-group').onclick = () => {
  userPickerModal({ multi:true, title:'New group', desc:'Name your group and pick the members to add.', onConfirm: async (ids, name) => {
    const { data: c, error } = await sb.from('conversations').insert({ type:'group', name, created_by: state.user.id }).select().single();
    if(error) return toast('Error', error.message, state.user.id);
    const rows = [{ conversation_id: c.id, user_id: state.user.id, role:'admin' }];
    ids.forEach(uid=>rows.push({ conversation_id:c.id, user_id:uid, role:'member' }));
    await sb.from('conversation_members').insert(rows);
    await loadConversations(); switchConversation(c.id);
  }});
};

function openAddMember(c){
  userPickerModal({ multi:false, title:'Add member', desc:`Add someone to ${c.name||'this group'}.`, onConfirm: async ([uid]) => {
    if(c.members.some(m=>m.user_id===uid)) return toast('Info','Already a member', uid);
    const { error } = await sb.from('conversation_members').insert({ conversation_id:c.id, user_id:uid, role:'member' });
    if(error) return toast('Error', error.message, state.user.id);
    await loadConversations(); switchConversation(c.id);
  }});
}

async function leaveGroup(c){
  if(!confirm('Leave this group?')) return;
  await sb.from('conversation_members').delete().eq('conversation_id', c.id).eq('user_id', state.user.id);
  if(state.convChannels[c.id]){ sb.removeChannel(state.convChannels[c.id]); delete state.convChannels[c.id]; }
  state.activeId=null;
  $('#main').innerHTML = '<div class="empty"><div class="ico">💬</div><h3>Your messages</h3><p>Pick a chat from the left or start a new conversation.</p></div>';
  document.body.classList.remove('show-chat');
  await loadConversations();
}

window.addEventListener('beforeunload', () => {
  if(state.user) navigator.sendBeacon?.(`${SUPABASE_URL}/rest/v1/users?id=eq.${state.user.id}`);
});
</script>
