<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Pulse | Debugging Mode</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        #debug-log { 
            background: #000; border: 2px solid #4f46e5; padding: 15px; 
            border-radius: 8px; font-family: monospace; line-height: 1.6;
            max-width: 600px; margin: 0 auto;
        }
        .error { color: #f87171; }
        .success { color: #4ade80; }
        .hidden { display: none; }
        button { background: #4f46e5; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px;}
    </style>
</head>
<body>

<div id="debug-log">
    <h3 style="margin-top:0">🔍 Pulse Diagnostic System</h3>
    <div id="log-content">Initializing...</div>
    <div id="action-zone" class="hidden">
        <button onclick="location.href='login.html'">Back to Login</button>
        <button onclick="localStorage.clear(); location.reload();">Clear Storage & Retry</button>
    </div>
</div>

<div id="app-ui" class="hidden">
    <h1>If you see this, the app is working!</h1>
    <button onclick="window.sb.auth.signOut()">Logout</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://watrcanjjxdycydmllrj.supabase.co';
const SB_KEY = 'sb_publishable_dXrYdphNQJdWL_U4IjALTQ__rMZWfgQ';

const log = (msg, type='') => {
    const div = document.getElementById('log-content');
    div.innerHTML += `<div class="${type}">> ${msg}</div>`;
};

async function diagnostic() {
    try {
        log("Connecting to Supabase...");
        window.sb = createClient(SB_URL, SB_KEY);

        log("Waiting for session sync (1 sec)...");
        await new Promise(r => setTimeout(r, 1000));

        const { data: { session }, error: sessionError } = await sb.auth.getSession();

        if (sessionError) {
            log(`Session Error: ${sessionError.message}`, 'error');
            return;
        }

        if (!session) {
            log("NO SESSION FOUND.", 'error');
            log("Your browser has no login token stored.", 'error');
            document.getElementById('action-zone').classList.remove('hidden');
            // STOPPING REDIRECT HERE SO YOU CAN READ THIS
            return;
        }

        log("SESSION FOUND!", 'success');
        log(`User Email: ${session.user.email}`);

        log("Fetching profile from 'users' table...");
        const { data: profile, error: profileError } = await sb.from('users')
            .select('*')
            .eq('id', session.user.id)
            .maybeSingle();

        if (profileError) {
            log(`Database Error: ${profileError.message}`, 'error');
            return;
        }

        if (!profile) {
            log("PROFILE MISSING!", 'error');
            log(`ID ${session.user.id} exists in Auth but NOT in 'users' table.`, 'error');
            log("Fix: Sign up again or manually add this ID to the users table.", 'error');
            return;
        }

        log(`Welcome, ${profile.username}! Launching UI...`, 'success');
        setTimeout(() => {
            document.getElementById('debug-log').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
        }, 1500);

    } catch (e) {
        log(`CRITICAL CRASH: ${e.message}`, 'error');
    }
}

diagnostic();
</script>
</body>
</html>
