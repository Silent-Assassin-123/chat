<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniChat | Real-Time</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --sidebar-width: 320px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }

        body { background: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #auth-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .auth-card {
            background: var(--bg-light); padding: 2.5rem; border-radius: 1rem;
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        input {
            width: 100%; padding: 0.75rem; margin-bottom: 1rem; border-radius: 0.5rem;
            border: 1px solid #334155; background: #0f172a; color: white;
        }

        button {
            width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: none;
            background: var(--primary); color: white; font-weight: 600; cursor: pointer; transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Main App Layout */
        #app-screen { display: none; height: 100vh; grid-template-columns: var(--sidebar-width) 1fr; }

        /* Sidebar */
        aside {
            background: var(--bg-light); border-right: 1px solid #334155;
            display: flex; flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }

        .chat-list { flex: 1; overflow-y: auto; }
        
        .chat-item {
            padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem;
            cursor: pointer; border-bottom: 1px solid #1e293b; transition: 0.2s;
        }

        .chat-item:hover { background: #334155; }
        .chat-item.active { background: #3b82f633; border-left: 4px solid var(--primary); }

        .avatar {
            width: 45px; height: 45px; border-radius: 50%; background: #475569;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .status-dot {
            width: 12px; height: 12px; border-radius: 50%; background: #64748b;
            border: 2px solid var(--bg-light); margin-left: -15px; margin-top: 30px;
        }
        .status-online { background: var(--accent); }

        /* Chat Area */
        main { display: flex; flex-direction: column; background: #0f172a; position: relative; }

        .chat-header {
            padding: 1rem 2rem; background: var(--bg-light); border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }

        #message-container {
            flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem;
        }

        .msg { max-width: 70%; padding: 0.8rem 1.2rem; border-radius: 1rem; position: relative; line-height: 1.4; }
        .msg-sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 0.2rem; }
        .msg-received { align-self: flex-start; background: #334155; border-bottom-left-radius: 0.2rem; }
        
        .msg-meta { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.3rem; display: block; }

        .chat-input-area {
            padding: 1.5rem 2rem; background: var(--bg-light); border-top: 1px solid #334155;
            display: flex; gap: 1rem;
        }

        /* Notifications */
        .notif-badge {
            background: #ef4444; color: white; border-radius: 50%;
            padding: 2px 6px; font-size: 0.7rem; position: absolute; top: 10px; right: 10px;
        }

        /* Modals */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; items-center: center; justify-content: center; z-index: 100;
        }

        /* Utils */
        .hidden { display: none !important; }
        .flex { display: flex; }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">OmniChat</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <div style="display: flex; gap: 10px;">
                <button onclick="handleAuth('login')">Login</button>
                <button onclick="handleAuth('signup')" style="background: #475569;">Sign Up</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-screen">
        <aside>
            <div class="sidebar-header">
                <div id="user-profile" style="display: flex; align-items: center; gap: 10px;">
                    <div class="avatar" id="my-avatar">?</div>
                    <span id="my-username" style="font-weight: 600;">Loading...</span>
                </div>
                <button onclick="toggleModal('group-modal')" style="width: auto; padding: 5px 10px;"><i class="fas fa-plus"></i></button>
            </div>
            <div class="chat-list" id="chat-list">
                <!-- Chats will be injected here -->
            </div>
            <div style="padding: 1rem; border-top: 1px solid #334155;">
                <button onclick="supabaseClient.auth.signOut()" style="background: #ef4444;">Logout</button>
            </div>
        </aside>

        <main id="chat-main">
            <div id="no-chat-selected" style="display: flex; flex: 1; align-items: center; justify-content: center; color: var(--text-dim);">
                <h3>Select a conversation to start chatting</h3>
            </div>

            <div id="active-chat-ui" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
                <div class="chat-header">
                    <div>
                        <h3 id="target-chat-name">Chat Name</h3>
                        <span id="target-chat-status" style="font-size: 0.8rem; color: var(--accent);">online</span>
                    </div>
                    <div id="group-actions" class="hidden">
                        <button onclick="showMembers()" style="background:none; color: var(--text-dim);"><i class="fas fa-users"></i></button>
                    </div>
                </div>

                <div id="message-container"></div>

                <form class="chat-input-area" id="message-form">
                    <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
                    <button type="submit" style="width: 60px;"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </main>
    </div>

    <!-- Create Group Modal -->
    <div id="group-modal" class="modal">
        <div class="auth-card">
            <h3>Create Group</h3>
            <input type="text" id="group-name-input" placeholder="Group Name">
            <button onclick="createGroup()">Create</button>
            <button onclick="toggleModal('group-modal')" style="background: transparent; color: var(--text-dim); margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://dkhczzeacrxlagpjoamg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__qSV0mKnZzvPapxXuvmM4g_I8CE8aGY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- STATE ---
        let currentUser = null;
        let activeConversationId = null;
        let conversations = [];

        // --- AUTH LOGIC ---
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            const { data, error } = type === 'login' 
                ? await supabaseClient.auth.signInWithPassword({ email, password })
                : await supabaseClient.auth.signUp({ email, password });

            if (error) return alert(error.message);
            
            if (type === 'signup') {
                const username = email.split('@')[0];
                await supabaseClient.from('profiles').insert([{ id: data.user.id, username }]);
            }
            checkUser();
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'grid';
                loadProfile();
                loadConversations();
                subscribeToGlobalChanges();
                initPresence();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        }

        async function loadProfile() {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if (data) {
                document.getElementById('my-username').innerText = data.username;
                document.getElementById('my-avatar').innerText = data.username[0].toUpperCase();
            }
        }

        // --- CONVERSATION LOGIC ---
        async function loadConversations() {
            const { data, error } = await supabase
                .from('conversation_members')
                .select(`
                    conversation_id,
                    conversations ( id, name, type )
                `)
                .eq('user_id', currentUser.id);

            if (data) {
                conversations = data.map(d => d.conversations);
                renderChatList();
            }
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = conversations.map(c => `
                <div class="chat-item ${activeConversationId === c.id ? 'active' : ''}" onclick="selectConversation('${c.id}')">
                    <div class="avatar">${(c.name || 'D')[0].toUpperCase()}</div>
                    <div style="flex: 1">
                        <div style="font-weight: 600;">${c.name || 'Direct Chat'}</div>
                        <div style="font-size: 0.8rem; color: var(--text-dim);">${c.type}</div>
                    </div>
                </div>
            `).join('');
        }

        async function selectConversation(id) {
            activeConversationId = id;
            const conv = conversations.find(c => c.id === id);
            
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('active-chat-ui').classList.remove('hidden');
            document.getElementById('target-chat-name').innerText = conv.name || 'Direct Message';
            
            renderChatList();
            loadMessages(id);
            subscribeToMessages(id);
        }

        // --- MESSAGE LOGIC ---
        async function loadMessages(convId) {
            const { data } = await supabase
                .from('messages')
                .select(`*, profiles:sender_id(username)`)
                .eq('conversation_id', convId)
                .order('created_at', { ascending: true });

            const container = document.getElementById('message-container');
            container.innerHTML = data.map(m => renderMessageHtml(m)).join('');
            scrollToBottom();
        }

        function renderMessageHtml(m) {
            const isMe = m.sender_id === currentUser.id;
            return `
                <div class="msg ${isMe ? 'msg-sent' : 'msg-received'}">
                    <div style="font-size: 0.7rem; opacity: 0.8; margin-bottom: 4px;">
                        ${isMe ? 'You' : m.profiles?.username || 'User'}
                    </div>
                    ${m.content}
                    <span class="msg-meta">${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `;
        }

        document.getElementById('message-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content || !activeConversationId) return;

            const { error } = await supabaseClient.from('messages').insert([{
                conversation_id: activeConversationId,
                sender_id: currentUser.id,
                content: content
            }]);

            if (!error) input.value = '';
        };

        // --- REALTIME SUBSCRIPTIONS ---
        let messageSubscription;
        function subscribeToMessages(convId) {
            if (messageSubscription) supabase.removeChannel(messageSubscription);

            messageSubscription = supabase
                .channel(`public:messages:conversation_id=eq.${convId}`)
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'messages',
                    filter: `conversation_id=eq.${convId}` 
                }, async (payload) => {
                    // Fetch user info for the new message
                    const { data } = await supabaseClient.from('profiles').select('username').eq('id', payload.new.sender_id).single();
                    const fullMsg = { ...payload.new, profiles: data };
                    
                    const container = document.getElementById('message-container');
                    container.innerHTML += renderMessageHtml(fullMsg);
                    scrollToBottom();
                    showNotification(fullMsg);
                })
                .subscribe();
        }

        function subscribeToGlobalChanges() {
            // Watch for new conversations
            supabase.channel('global_changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'conversations' }, loadConversations)
                .subscribe();
        }

        // --- PRESENCE ---
        function initPresence() {
            const channel = supabase.channel('online-users');
            channel
                .on('presence', { event: 'sync' }, () => {
                    const state = channel.presenceState();
                    console.log('Presence state synced', state);
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await channel.track({
                            user_id: currentUser.id,
                            online_at: new Date().toISOString(),
                        });
                    }
                });
        }

        // --- GROUP LOGIC ---
        async function createGroup() {
            const name = document.getElementById('group-name-input').value;
            if (!name) return;

            const { data: conv, error } = await supabase
                .from('conversations')
                .insert([{ name, type: 'group', created_by: currentUser.id }])
                .select()
                .single();

            if (conv) {
                await supabaseClient.from('conversation_members').insert([{
                    conversation_id: conv.id,
                    user_id: currentUser.id,
                    role: 'admin'
                }]);
                toggleModal('group-modal');
                loadConversations();
            }
        }

        // --- UI UTILS ---
        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function scrollToBottom() {
            const c = document.getElementById('message-container');
            c.scrollTop = c.scrollHeight;
        }

        function showNotification(msg) {
            if (msg.sender_id === currentUser.id) return;
            if (Notification.permission === "granted") {
                new Notification(`New message from ${msg.profiles?.username}`, { body: msg.content });
            }
        }

        // Init
        Notification.requestPermission();
        supabaseClient.auth.onAuthStateChange(() => checkUser());
        checkUser();
    </script>
</body>
</html>
