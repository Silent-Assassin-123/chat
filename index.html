<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat App</title>

<style>
/* =========================
   GLOBAL SMOOTH UI SYSTEM
========================= */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Arial;
  display: flex;
  height: 100vh;
  background: #0e1116;
  color: #e6e6e6;
}

/* =========================
   LOGIN (FIXED FULL SCREEN)
========================= */
#auth {
  position: absolute;
  inset: 0;
  background: #0e1116;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.box {
  width: 100%;
  max-width: 380px;
  background: #151a21;
  padding: 28px;
  border-radius: 14px;
  border: 1px solid #232a33;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.box h3 {
  margin: 0 0 18px;
  font-size: 20px;
  font-weight: 600;
}

.box input {
  width: 100%;
  padding: 12px 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #232a33;
  background: #0e1116;
  color: white;
  outline: none;
  transition: border 0.2s ease;
}

.box input:focus {
  border-color: #2a8f77;
}

.box button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #2a8f77;
  color: white;
  cursor: pointer;
  transition: background 0.2s ease;
}

.box button:hover {
  background: #247a66;
}

.box button + button {
  background: #1b222c;
}

.box button + button:hover {
  background: #222b36;
}

/* =========================
   SIDEBAR
========================= */
#sidebar {
  width: 300px;
  background: #151a21;
  border-right: 1px solid #232a33;
  display: flex;
  flex-direction: column;
}

.chat {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #1f2630;
  transition: background 0.2s ease;
}

.chat:hover {
  background: #1b222c;
}

.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #222b36;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* =========================
   MAIN CHAT
========================= */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
#header {
  height: 58px;
  background: #151a21;
  border-bottom: 1px solid #232a33;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}

/* MEMBERS PANEL */
#groupMembersPanel {
  display: none;
  position: absolute;
  right: 16px;
  top: 70px;
  width: 220px;
  background: #151a21;
  border: 1px solid #232a33;
  border-radius: 10px;
  padding: 10px;
  font-size: 13px;
}

/* =========================
   MESSAGES
========================= */
#messages {
  flex: 1;
  padding: 14px;
  overflow-y: auto;
}

.msg {
  max-width: 65%;
  margin: 6px 0;
  padding: 9px 12px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.3;
  box-shadow: 0 1px 2px rgba(0,0,0,0.25);
  animation: fadeIn 0.15s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(2px); }
  to { opacity: 1; transform: translateY(0); }
}

.me {
  margin-left: auto;
  background: #1f6f5b;
}

.other {
  background: #1b222c;
}

.tick {
  font-size: 11px;
  opacity: 0.7;
  margin-left: 6px;
}

/* =========================
   INPUT
========================= */
#inputBar {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: #151a21;
  border-top: 1px solid #232a33;
}

#msgInput {
  flex: 1;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #232a33;
  background: #0e1116;
  color: white;
  outline: none;
}

button {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #2a8f77;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #247a66;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="box">
    <h3>Welcome Back</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div id="main">

  <div id="header">
    <div id="chatTitle">Select chat</div>
    <button onclick="toggleMembers()">Members</button>
  </div>

  <div id="groupMembersPanel"></div>

  <div id="messages"></div>

  <div id="inputBar">
    <input id="msgInput" placeholder="Message..." />
    <input type="file" id="fileInput" />
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = supabase.createClient(
  "https://nodnyrkpirsbhxxhdntx.supabase.co",
  "sb_publishable_S55FpS4I91YinxA58Nyp5w_E7Yj76I-"
);

let user = null;
let activeChat = null;

/* ================= AUTH ================= */

async function login() {
  const { data } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  user = data.user;
  auth.style.display = "none";
  loadChats();
}

async function signup() {
  await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });
}

/* ================= CHAT LIST ================= */

async function loadChats() {
  const { data } = await supabase.from("conversations").select("*");

  sidebar.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "chat";

    div.innerHTML = `
      <div class="avatar">💬</div>
      <div>${c.name || "Chat"}</div>
    `;

    div.onclick = () => openChat(c);
    sidebar.appendChild(div);
  });
}

/* ================= OPEN CHAT ================= */

function openChat(chat) {
  activeChat = chat;
  chatTitle.innerText = chat.name || "Chat";
  messages.innerHTML = "";

  loadMessages();
  subscribe(chat.id);
}

/* ================= MESSAGES ================= */

async function loadMessages() {
  const { data } = await supabase
    .from("messages")
    .select("*")
    .eq("conversation_id", activeChat.id)
    .order("created_at");

  data.forEach(renderMessage);
}

/* ================= SEND ================= */

async function send() {
  const text = msgInput.value;
  const file = fileInput.files[0];

  if (!text && !file) return;

  let file_url = null;

  if (file) {
    const { data } = await supabase.storage
      .from("files")
      .upload(`${Date.now()}_${file.name}`, file);

    file_url = data.path;
  }

  await supabase.from("messages").insert({
    conversation_id: activeChat.id,
    sender_id: user.id,
    content: text,
    file_url
  });

  msgInput.value = "";
  fileInput.value = "";
}

/* ================= RENDER ================= */

function renderMessage(m) {
  const div = document.createElement("div");
  div.className = "msg " + (m.sender_id === user.id ? "me" : "other");

  let content = m.content || "";

  if (m.file_url) content += " 📎";

  const tick = m.sender_id === user.id ? " <span class='tick'>✔✔</span>" : "";

  div.innerHTML = content + tick;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* ================= REALTIME ================= */

function subscribe(id) {
  supabase.channel("chat-" + id)
    .on("postgres_changes", {
      event: "INSERT",
      table: "messages",
      filter: "conversation_id=eq." + id
    }, payload => renderMessage(payload.new))
    .subscribe();
}

/* ================= MEMBERS ================= */

async function toggleMembers() {
  const panel = groupMembersPanel;

  if (panel.style.display === "block") {
    panel.style.display = "none";
    return;
  }

  const { data } = await supabase
    .from("conversation_members")
    .select("*")
    .eq("conversation_id", activeChat.id);

  panel.innerHTML = "<b>Members</b><br>";

  data.forEach(m => {
    panel.innerHTML += `• ${m.user_id}<br>`;
  });

  panel.style.display = "block";
}

/* ================= INIT ================= */

supabase.auth.onAuthStateChange((e, session) => {
  if (session) {
    user = session.user;
    auth.style.display = "none";
    loadChats();
  }
});
</script>

</body>
</html>
