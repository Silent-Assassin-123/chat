<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pulse | Join</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--panel:#ffffff;--accent:#4f46e5;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--input:#f1f5f9;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}
.card{background:var(--panel);padding:40px;border-radius:24px;width:360px;box-shadow:0 10px 25px rgba(0,0,0,0.05);border:1px solid var(--border);text-align:center;}
.logo{width:48px;height:48px;background:var(--accent);border-radius:12px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;}
h1{margin:0 0 8px;font-size:24px;letter-spacing:-0.5px;}
input{width:100%;padding:14px;margin-bottom:12px;border-radius:12px;border:1px solid var(--border);background:var(--input);color:var(--text);outline:none;box-sizing:border-box;transition:0.2s;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79, 70, 229, 0.1);}
button{width:100%;padding:14px;background:var(--accent);color:#fff;border-radius:12px;border:none;font-weight:600;cursor:pointer;transition:0.2s;}
.toggle{margin-top:20px;font-size:14px;color:var(--muted);}
.toggle span{color:var(--accent);cursor:pointer;font-weight:600;}
</style>
</head>
<body>
<div class="card">
    <div class="logo">P</div>
    <h1 id="t">Pulse</h1>
    <div id="reg" style="display:none"><input id="u" type="text" placeholder="Username" /></div>
    <input id="e" type="email" placeholder="Email" />
    <input id="p" type="password" placeholder="Password" />
    <button id="btn">Log In</button>
    <div class="toggle">Need an account? <span id="sw">Sign up</span></div>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');
let mode = 'login';
const $ = s => document.querySelector(s);
$('#sw').onclick = () => {
    mode = mode === 'login' ? 'signup' : 'login';
    $('#t').textContent = mode === 'login' ? 'Pulse' : 'Create Account';
    $('#btn').textContent = mode === 'login' ? 'Log In' : 'Sign Up';
    $('#reg').style.display = mode === 'login' ? 'none' : 'block';
};
$('#btn').onclick = async () => {
    try {
        if(mode === 'login') await sb.auth.signInWithPassword({ email:$('#e').value, password:$('#p').value });
        else {
            const { data } = await sb.auth.signUp({ email:$('#e').value, password:$('#p').value });
            if(data.user) await sb.from('users').insert({ id: data.user.id, username: $('#u').value });
        }
        window.location.href = 'index.html';
    } catch(e){ alert(e.message); }
};
sb.auth.getSession().then(({data}) => { if(data.session) window.location.href = 'index.html'; });
</script>
</body>
</html>
